<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Pink Unicorn Radio</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --pink: #ff2d9b;
    --purple: #9b2dff;
    --cyan: #2dffee;
    --dark: #0a0010;
    --card: rgba(255,255,255,0.04);
  }

  body {
    background: var(--dark);
    color: #fff;
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Анимированный фон */
  .bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
  }
  .bg::before {
    content: '';
    position: absolute;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(155,45,255,0.25) 0%, transparent 70%);
    top: -200px; left: -150px;
    animation: pulse1 6s ease-in-out infinite;
  }
  .bg::after {
    content: '';
    position: absolute;
    width: 500px; height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,45,155,0.2) 0%, transparent 70%);
    bottom: -150px; right: -100px;
    animation: pulse2 8s ease-in-out infinite;
  }
  @keyframes pulse1 {
    0%,100% { transform: scale(1) translate(0,0); }
    50% { transform: scale(1.2) translate(30px, 20px); }
  }
  @keyframes pulse2 {
    0%,100% { transform: scale(1) translate(0,0); }
    50% { transform: scale(1.15) translate(-20px, -30px); }
  }

  /* Сетка частиц */
  .grid {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,45,155,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,45,155,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 380px;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  /* Логотип */
  .logo-wrap {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .unicorn-icon {
    font-size: 64px;
    filter: drop-shadow(0 0 20px rgba(255,45,155,0.8));
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  .station-name {
    font-family: 'Orbitron', monospace;
    font-size: 20px;
    font-weight: 900;
    letter-spacing: 3px;
    text-transform: uppercase;
    background: linear-gradient(135deg, var(--pink), var(--purple), var(--cyan));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-align: center;
    line-height: 1.3;
  }

  .genre-tag {
    font-size: 11px;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    text-align: center;
  }

  /* Визуализатор */
  .visualizer {
    display: flex;
    align-items: flex-end;
    gap: 4px;
    height: 50px;
    opacity: 0.3;
    transition: opacity 0.5s;
  }
  .visualizer.active { opacity: 1; }

  .bar {
    width: 5px;
    background: linear-gradient(to top, var(--pink), var(--purple));
    border-radius: 3px 3px 0 0;
    animation: none;
    height: 4px;
    transition: height 0.1s;
  }
  .visualizer.active .bar:nth-child(1) { animation: bar 0.8s ease-in-out infinite; }
  .visualizer.active .bar:nth-child(2) { animation: bar 0.6s ease-in-out infinite 0.1s; }
  .visualizer.active .bar:nth-child(3) { animation: bar 1.0s ease-in-out infinite 0.05s; }
  .visualizer.active .bar:nth-child(4) { animation: bar 0.7s ease-in-out infinite 0.2s; }
  .visualizer.active .bar:nth-child(5) { animation: bar 0.9s ease-in-out infinite 0.15s; }
  .visualizer.active .bar:nth-child(6) { animation: bar 0.65s ease-in-out infinite 0.3s; }
  .visualizer.active .bar:nth-child(7) { animation: bar 1.1s ease-in-out infinite 0.08s; }
  .visualizer.active .bar:nth-child(8) { animation: bar 0.75s ease-in-out infinite 0.25s; }
  .visualizer.active .bar:nth-child(9) { animation: bar 0.85s ease-in-out infinite 0.12s; }
  .visualizer.active .bar:nth-child(10) { animation: bar 0.95s ease-in-out infinite 0.18s; }

  @keyframes bar {
    0%,100% { height: 4px; }
    50% { height: 40px; }
  }

  /* Карточка плеера */
  .player-card {
    width: 100%;
    background: var(--card);
    border: 1px solid rgba(255,45,155,0.2);
    border-radius: 20px;
    padding: 24px;
    backdrop-filter: blur(20px);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    box-shadow: 0 0 40px rgba(155,45,255,0.15), inset 0 1px 0 rgba(255,255,255,0.08);
  }

  /* Статус */
  .status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    letter-spacing: 1px;
    color: rgba(255,255,255,0.6);
    text-transform: uppercase;
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #444;
    transition: background 0.3s;
    flex-shrink: 0;
  }
  .status-dot.live {
    background: var(--pink);
    box-shadow: 0 0 10px var(--pink);
    animation: blink 1.5s ease-in-out infinite;
  }
  @keyframes blink {
    0%,100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* Кнопка Play */
  .play-btn {
    width: 80px; height: 80px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    position: relative;
    background: linear-gradient(135deg, var(--pink), var(--purple));
    box-shadow: 0 0 30px rgba(255,45,155,0.5);
    transition: transform 0.2s, box-shadow 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .play-btn:hover { transform: scale(1.05); box-shadow: 0 0 50px rgba(255,45,155,0.7); }
  .play-btn:active { transform: scale(0.95); }

  .play-btn::before {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    border: 2px solid rgba(255,45,155,0.3);
    animation: ring 2s linear infinite;
    opacity: 0;
  }
  .play-btn.playing::before { opacity: 1; }
  @keyframes ring {
    0% { transform: scale(1); opacity: 0.5; }
    100% { transform: scale(1.4); opacity: 0; }
  }

  .play-icon {
    font-size: 32px;
    line-height: 1;
    margin-left: 4px;
    transition: opacity 0.2s;
  }

  /* Громкость */
  .volume-wrap {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .vol-btn {
    background: none;
    border: none;
    font-size: 20px;
    cursor: pointer;
    padding: 4px;
    opacity: 0.7;
    transition: opacity 0.2s, transform 0.1s;
  }
  .vol-btn:active { transform: scale(0.85); opacity: 1; }
  .vol-bar-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .vol-bar-bg {
    width: 100%;
    height: 6px;
    background: rgba(255,255,255,0.1);
    border-radius: 3px;
    overflow: hidden;
  }
  .vol-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--purple), var(--pink));
    border-radius: 3px;
    transition: width 0.2s;
  }
  .vol-pct {
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    font-family: 'Orbitron', monospace;
  }

  /* Now Playing */
  .now-playing {
    width: 100%;
    background: rgba(255,45,155,0.08);
    border: 1px solid rgba(255,45,155,0.2);
    border-radius: 12px;
    padding: 12px 16px;
    text-align: center;
  }
  .np-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .np-artist {
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    color: var(--pink);
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .np-track {
    font-size: 12px;
    color: rgba(255,255,255,0.7);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Кнопка лайка Spotify */
  .like-btn {
    margin-top: 10px;
    padding: 8px 16px;
    border-radius: 20px;
    border: 1px solid #1DB954;
    background: rgba(29,185,84,0.1);
    color: #1DB954;
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    width: 100%;
  }
  .like-btn:active { transform: scale(0.97); }
  .like-btn.liked { background: rgba(29,185,84,0.3); }
  .like-msg {
    font-size: 11px;
    margin-top: 6px;
    color: rgba(255,255,255,0.5);
    text-align: center;
    min-height: 16px;
  }

  /* Инфо блок */
  .info-row {
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 12px 0;
    border-top: 1px solid rgba(255,255,255,0.06);
    gap: 8px;
  }
  .info-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    flex: 1;
  }
  .info-label {
    font-size: 10px;
    letter-spacing: 1.5px;
    color: rgba(255,255,255,0.3);
    text-transform: uppercase;
  }
  .info-value {
    font-family: 'Orbitron', monospace;
    font-size: 12px;
    color: var(--cyan);
  }

  /* Ссылки */
  .links {
    display: flex;
    gap: 12px;
  }
  .link-btn {
    padding: 8px 16px;
    border-radius: 30px;
    border: 1px solid rgba(255,45,155,0.3);
    background: transparent;
    color: rgba(255,255,255,0.7);
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    letter-spacing: 1px;
    cursor: pointer;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.2s;
  }
  .link-btn:hover {
    border-color: var(--pink);
    color: #fff;
    background: rgba(255,45,155,0.1);
  }

  /* Ошибка */
  .error-msg {
    display: none;
    font-size: 12px;
    color: #ff6b6b;
    text-align: center;
    padding: 8px;
  }
  .error-msg.show { display: block; }
</style>
</head>
<body>

<div class="bg"></div>
<div class="grid"></div>

<div class="container">

  <div class="logo-wrap">
    <div class="unicorn-icon">🦄</div>
    <div class="station-name">Pink Unicorn<br>Radio</div>
    <div class="genre-tag">Rock · Metal · Alternative</div>
  </div>

  <div class="visualizer" id="visualizer">
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <div class="bar"></div>
  </div>

  <div class="player-card">
    <div class="status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Нажми Play</span>
    </div>

    <button class="play-btn" id="playBtn" onclick="togglePlay()">
      <span class="play-icon" id="playIcon">▶</span>
    </button>

    <div class="volume-wrap">
      <button class="vol-btn" onclick="changeVolume(-10)">🔈</button>
      <div class="vol-bar-wrap">
        <div class="vol-bar-bg">
          <div class="vol-bar-fill" id="volFill" style="width:80%"></div>
        </div>
        <span class="vol-pct" id="volPct">80%</span>
      </div>
      <button class="vol-btn" onclick="changeVolume(10)">🔊</button>
    </div>

    <!-- Now Playing -->
    <div class="now-playing" id="nowPlaying" style="display:none">
      <div class="np-label">🎵 Сейчас играет</div>
      <div class="np-artist" id="npArtist">—</div>
      <div class="np-track" id="npTrack">—</div>
      <button class="like-btn" id="likeBtn" onclick="likeTrack()" style="display:none">
        <span id="likeIcon">🤍</span> Добавить в Spotify
      </button>
      <div class="like-msg" id="likeMsg"></div>
    </div>

    <div class="info-row">
      <div class="info-item">
        <div class="info-label">Жанр</div>
        <div class="info-value" style="font-size:10px;color:#ff2d9b">ROCK</div>
      </div>
      <div class="info-item">
        <div class="info-label">Страна</div>
        <div class="info-value" style="font-size:16px">🇺🇿</div>
      </div>
      <div class="info-item">
        <div class="info-label">Основан</div>
        <div class="info-value">2017</div>
      </div>
    </div>

    <div class="error-msg" id="errorMsg">
      ⚠️ Не удалось подключиться к потоку.<br>Проверь интернет-соединение.
    </div>
  </div>

  <div class="links">
    <a class="link-btn" href="https://www.beatport.com/label/pink-unicorn-records/65562" target="_blank">🎵 Beatport</a>
    <a class="link-btn" href="https://soundcloud.com/pinkunicornrec" target="_blank">☁️ SoundCloud</a>
  </div>

</div>

<audio id="radio" preload="none"></audio>

<script>
  // Инициализация Telegram Web App
  if (window.Telegram && window.Telegram.WebApp) {
    Telegram.WebApp.ready();
    Telegram.WebApp.expand();
    Telegram.WebApp.setHeaderColor('#0a0010');
    Telegram.WebApp.setBackgroundColor('#0a0010');
  }

  const STREAM_URLS = [
    'https://listen2.myradio24.com/unicorn',
    'https://streaming.slam.nl/web11_mp3',
    'http://cast2.my-ais.net:8022/stream',
  ];
  let urlIndex = 0;
  const audio = document.getElementById('radio');
  const playBtn = document.getElementById('playBtn');
  const playIcon = document.getElementById('playIcon');
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const visualizer = document.getElementById('visualizer');
  const errorMsg = document.getElementById('errorMsg');

  let isPlaying = false;

  audio.volume = 0.8;

  // Media Session для фонового режима
  function updateMediaSession(artist, track, artworkUrl) {
    if ('mediaSession' in navigator) {
      const img = artworkUrl || 'https://static.wixstatic.com/media/6062a7_fbcc0346d0fe43ac8a6e08d6c6b915aa~mv2_d_1750_1750_s_2.png';
      navigator.mediaSession.metadata = new MediaMetadata({
        title: track || 'Live Stream',
        artist: artist || 'Pink Unicorn Radio',
        album: 'Rock · Metal · Alternative',
        artwork: [{ src: img, sizes: '512x512', type: 'image/jpeg' }]
      });
      navigator.mediaSession.setActionHandler('play', () => { if (!isPlaying) togglePlay(); });
      navigator.mediaSession.setActionHandler('pause', () => { if (isPlaying) togglePlay(); });
    }
  }

  audio.addEventListener('waiting', () => {
    statusText.textContent = 'Загрузка...';
    statusDot.className = 'status-dot';
  });

  audio.addEventListener('playing', () => {
    statusText.textContent = '● LIVE';
    statusDot.className = 'status-dot live';
    visualizer.classList.add('active');
    playBtn.classList.add('playing');
    errorMsg.classList.remove('show');
    urlIndex = 0;
    startMeta();
  });

  audio.addEventListener('pause', () => {
    if (!isPlaying) return;
    statusText.textContent = 'Пауза';
    statusDot.className = 'status-dot';
    visualizer.classList.remove('active');
    playBtn.classList.remove('playing');
  });

  audio.addEventListener('error', () => {
    if (!isPlaying) return;
    urlIndex++;
    if (urlIndex < STREAM_URLS.length) {
      statusText.textContent = 'Пробую другой адрес...';
      setTimeout(() => {
        audio.src = STREAM_URLS[urlIndex];
        audio.play().catch(() => {});
      }, 1000);
    } else {
      statusText.textContent = 'Нет сигнала';
      statusDot.className = 'status-dot';
      visualizer.classList.remove('active');
      playBtn.classList.remove('playing');
      playIcon.textContent = '▶';
      isPlaying = false;
      errorMsg.innerHTML = '⚠️ Радиостанция сейчас не вещает.<br>Попробуй позже.';
      errorMsg.classList.add('show');
    }
  });

  function togglePlay() {
    if (isPlaying) {
      audio.pause();
      audio.src = '';
      playIcon.textContent = '▶';
      isPlaying = false;
      statusText.textContent = 'Остановлено';
      statusDot.className = 'status-dot';
      visualizer.classList.remove('active');
      playBtn.classList.remove('playing');
      stopMeta();
    } else {
      errorMsg.classList.remove('show');
      urlIndex = 0;
      audio.src = STREAM_URLS[urlIndex];
      audio.play().catch(() => {});
      playIcon.textContent = '⏹';
      statusText.textContent = 'Подключение...';
      isPlaying = true;
    }
  }

  let volLevel = 80;

  function changeVolume(delta) {
    volLevel = Math.min(100, Math.max(0, volLevel + delta));
    try { audio.volume = volLevel / 100; } catch(e) {}
    document.getElementById('volFill').style.width = volLevel + '%';
    document.getElementById('volPct').textContent = volLevel + '%';
  }

  // Метаданные
  const nowPlaying = document.getElementById('nowPlaying');
  const npArtist = document.getElementById('npArtist');
  const npTrack = document.getElementById('npTrack');
  let metaInterval = null;

  function setTrack(full) {
    full = (full || '').trim();
    if (!full || full.length < 3) return false;
    const d = full.indexOf(' - ');
    if (d !== -1) {
      npArtist.textContent = full.substring(0, d).trim();
      npTrack.textContent = full.substring(d + 3).trim();
    } else {
      npArtist.textContent = full;
      npTrack.textContent = '';
    }
    return true;
  }

  // URL нашего API на Railway — замени на свой после деплоя
  // Формат: https://твой-проект.up.railway.app/
  const API_URL = 'https://pink-unicorn-bot-production.up.railway.app/';

  async function fetchNowPlaying() {
    try {
      const res = await fetch(API_URL, {signal: AbortSignal.timeout(6000)});
      if (res.ok) {
        const data = await res.json();
        if (data.artist && data.artist !== 'Pink Unicorn Radio') {
          npArtist.textContent = data.artist;
          npTrack.textContent = data.track || '';
          currentArtist = data.artist;
          currentTrack = data.track || '';
          updateMediaSession(data.artist, data.track, data.artwork);
          // Показываем кнопку лайка и сбрасываем состояние
          const likeBtn = document.getElementById('likeBtn');
          likeBtn.style.display = 'block';
          likeBtn.classList.remove('liked');
          document.getElementById('likeIcon').textContent = '🤍';
          document.getElementById('likeMsg').textContent = '';
          return;
        }
      }
    } catch(e) {}
    if (npArtist.textContent === '⏳ Загрузка...') {
      npArtist.textContent = 'Pink Unicorn Radio';
      npTrack.textContent = '🎵 Live';
      updateMediaSession('Pink Unicorn Radio', 'Live Stream');
    }
  }

  function startMeta() {
    nowPlaying.style.display = 'block';
    npArtist.textContent = '⏳ Загрузка...';
    npTrack.textContent = '';
    updateMediaSession('Pink Unicorn Radio', 'Live Stream');
    fetchNowPlaying();
    metaInterval = setInterval(fetchNowPlaying, 20000);
  }

  function stopMeta() {
    nowPlaying.style.display = 'none';
    if (metaInterval) { clearInterval(metaInterval); metaInterval = null; }
  }

  // ──────────── SPOTIFY ИНТЕГРАЦИЯ ────────────
  const SPOTIFY_CLIENT_ID = 'f146531bb7924a378c94c672ec31faa3';
  const SPOTIFY_REDIRECT = 'https://ziminaanastasiya13-lang.github.io/pink-unicorn-radio/';
  const SPOTIFY_SCOPES = 'playlist-modify-public playlist-modify-private';
  let spotifyToken = null;
  let currentArtist = '';
  let currentTrack = '';

  // Проверяем токен при загрузке (после редиректа)
  function checkSpotifyCallback() {
    const hash = window.location.hash;
    if (hash) {
      const params = new URLSearchParams(hash.substring(1));
      const token = params.get('access_token');
      if (token) {
        spotifyToken = token;
        sessionStorage.setItem('spotify_token', token);
        window.history.replaceState({}, document.title, window.location.pathname);
        if (currentArtist && currentTrack) addToSpotify();
      }
    }
    const saved = sessionStorage.getItem('spotify_token');
    if (saved) spotifyToken = saved;
  }

  function loginSpotify() {
    const url = `https://accounts.spotify.com/authorize?client_id=${SPOTIFY_CLIENT_ID}&response_type=token&redirect_uri=${encodeURIComponent(SPOTIFY_REDIRECT)}&scope=${encodeURIComponent(SPOTIFY_SCOPES)}`;
    window.location.href = url;
  }

  async function addToSpotify() {
    const likeMsg = document.getElementById('likeMsg');
    const likeBtn = document.getElementById('likeBtn');
    likeMsg.textContent = '🔍 Ищу трек в Spotify...';
    try {
      // Ищем трек
      const q = encodeURIComponent(`${currentArtist} ${currentTrack}`);
      const searchRes = await fetch(`https://api.spotify.com/v1/search?q=${q}&type=track&limit=1`, {
        headers: { 'Authorization': `Bearer ${spotifyToken}` }
      });
      if (searchRes.status === 401) {
        spotifyToken = null;
        sessionStorage.removeItem('spotify_token');
        likeMsg.textContent = '🔒 Нужна авторизация';
        loginSpotify();
        return;
      }
      const searchData = await searchRes.json();
      const track = searchData.tracks?.items?.[0];
      if (!track) { likeMsg.textContent = '❌ Трек не найден в Spotify'; return; }

      // Получаем ID пользователя
      const meRes = await fetch('https://api.spotify.com/v1/me', {
        headers: { 'Authorization': `Bearer ${spotifyToken}` }
      });
      const me = await meRes.json();

      // Ищем или создаём плейлист "Pink Unicorn Radio"
      const plRes = await fetch(`https://api.spotify.com/v1/users/${me.id}/playlists?limit=50`, {
        headers: { 'Authorization': `Bearer ${spotifyToken}` }
      });
      const plData = await plRes.json();
      let playlist = plData.items?.find(p => p.name === 'Pink Unicorn Radio');

      if (!playlist) {
        const createRes = await fetch(`https://api.spotify.com/v1/users/${me.id}/playlists`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${spotifyToken}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: 'Pink Unicorn Radio', description: 'Треки с Pink Unicorn Radio 🦄', public: false })
        });
        playlist = await createRes.json();
      }

      // Добавляем трек
      await fetch(`https://api.spotify.com/v1/playlists/${playlist.id}/tracks`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${spotifyToken}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ uris: [track.uri] })
      });

      likeBtn.classList.add('liked');
      document.getElementById('likeIcon').textContent = '💚';
      likeMsg.textContent = `✅ Добавлено: ${track.name}`;
    } catch(e) {
      likeMsg.textContent = '❌ Ошибка, попробуй снова';
    }
  }

  async function likeTrack() {
    if (!currentArtist || !currentTrack) {
      document.getElementById('likeMsg').textContent = '⏳ Дождись загрузки трека';
      return;
    }
    if (!spotifyToken) {
      loginSpotify();
      return;
    }
    await addToSpotify();
  }

  checkSpotifyCallback();
</script>
